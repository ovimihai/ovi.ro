<meta charset="UTF-8">
{% if page.home %}<title>{{ site.title }}</title>{% else %}<title>{{ page.title }} | {{ site.title }}</title>{% endif %}
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="max-image-preview:large">
<link rel="alternate" type="application/rss+xml" title="{{ site.title }} &raquo; Feed" href="/feed/index.xml">
{% assign sheet = page.stylesheet | default: "style-main.css" %}
<link rel="stylesheet" id="omague-css" href="/assets/css/{{ sheet }}?ver=0.5" type="text/css" media="all">
